name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Symbolic Deploy
        run: echo "Simulando o Deploy da aplicação..."

  alertas:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notificação para o Discord
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: ${{ contains(needs.*.result, 'failure') && 'error' || 'info' }}
          details: O Workflow de CI/CD foi finalizado!
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          text: |
            **Repositório:** ${{ github.repository }}
            **Evento:** ${{ github.event_name }}
            **Status Final:** ${{ contains(needs.*.result, 'failure') && '❌ FALHA' || '✅ SUCESSO' }}
            **Commit:** ${{ github.event.head_commit.message }}
            **Link da Execução:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}